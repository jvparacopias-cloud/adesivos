<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Orçamento Profissional</title>
    <link class="component-style" rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="warning-banner">ATENÇÃO: AS MEDIDAS DE ALTURA E COMPRIMENTO DEVEM SER EM CM</div>
        
        <div class="logo-wrapper">
            <img src="LOGO PARÁ CÓPIAS.png" alt="Pará Cópias Logo" class="main-logo">
        </div>
    </div>

    <div class="tab-container">
        <button class="tab-button active" onclick="switchTab('orcamento')">Orçamento</button>
        <button class="tab-button" onclick="switchTab('produtos')">Produtos</button>
    </div>

    <div id="tab-orcamento" class="tab-content active">
        <div class="header" style="padding-top: 15px; padding-bottom: 0;">
            <h1 id="titulo-pagina">ORÇAMENTO DE ADESIVOS</h1>
            <p class="subtitle">Calculadora de Medidas e Materiais</p>
        </div>

        <div class="calculator-grid">
            <div class="input-group product-select">
                <label>Tipo de Produto</label>
                <select id="tipoProduto" onchange="atualizarMateriais()">
                    <option value="adesivo">Adesivos</option>
                    <option value="acrilico">Acrílico</option>
                    <option value="mdf">MDF</option>
                    <option value="pvc">PVC / PS</option>
                    <option value="impressão">Impressão</option>
                </select>
            </div>

            <div class="input-group" id="tipoImpressão" style="display: none;">
                <label>Tipo Folha</label>
                <select id="tipoFolha" onchange="atualizarMateriais(); calcularImp();">
                    <option value="sulfiteA4">Sulfite A4</option>
                    <option value="sulfiteA3">Sulfite A3</option>
                    <option value="couche170gA4">Couchê 170g A4</option>
                    <option value="couche170A3">Couchê 170g A3</option>
                    <option value="couche300A4">Couchê 300g A4</option>
                    <option value="couche300A3">Couchê 300g A3</option>
                    <option value="ap240gA4">AP 240g A4</option>
                    <option value="ap240gA3">AP 240g A3</option>
                    <option value="adesivopapelA4">Papel Adesivo A4</option>
                    <option value="adesivopapelA3">Papel Adesivo A3</option>
                </select>
            </div>

            <div id="camposNormais" style="display: contents;">
                <div class="input-group">
                    <label>Quantidade Total</label>
                    <input type="number" id="quantidade" value="100" oninput="calcular()">
                </div>

                <div class="input-group">
                    <label>Qtd Linhas</label>
                    <input type="number" id="qtdLinhas" value="10" oninput="calcular()">
                </div>

                <div class="input-group highlight-blue">
                    <label>Qtd por linha</label>
                    <input type="number" id="qtdPorLinha" readonly>
                </div>

                <div class="input-group">
                    <label>Altura UND (cm)</label>
                    <input type="number" id="altura" value="6" oninput="calcular()">
                </div>

                <div class="input-group">
                    <label>Comprimento UND (cm)</label>
                    <input type="number" id="comprimento" value="6" oninput="calcular()">
                </div>

                <div class="input-group">
                    <label>Material / Tipo</label>
                    <select id="material" onchange="calcular()"></select>
                </div>

                <div class="input-group highlight-blue">
                    <label>Espaços Comprimento (m)</label>
                    <input type="text" id="espacoComprimento" readonly>
                </div>

                <div class="input-group highlight-blue">
                    <label>Espaços Altura (m)</label>
                    <input type="text" id="espacoAltura" readonly>
                </div>

                <div class="input-group highlight-blue">
                    <label>Metro² Total</label>
                    <input type="text" id="metroQuadrado" readonly style="font-weight: bold;">
                </div>

                <div class="input-group result-total">
                    <label>Total (R$)</label>
                    <input type="text" id="valorTotal" readonly>
                </div>

                <div class="input-group result-rec">
                    <label>Valor Recomendado (R$)</label>
                    <input type="text" id="valorRecomendado" readonly>
                </div>

                <div class="input-group checkbox-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="aplicacao" onchange="calcular()">
                        Adicionar Aplicação (+ R$ 35,00/m²)
                    </label>
                </div>
            </div>
        </div>

        <div class="calculator-grid" id="gridImpressao" style="display: none;">
            <div class="input-group">
                <label>Tipo de Impressão</label>
                <select id="materialImp" onchange="calcularImp()"></select>
            </div>

            <div class="input-group">
                <label>Quantidade de folhas</label>
                <input type="number" id="qtdFolhas" value="1" oninput="calcularImp()">
            </div>

            <div class="input-group">
                <label>Frente e verso?</label>
                <select id="frenteVerso" onchange="calcularImp()">
                    <option value="nao">Não</option>
                    <option value="sim">Sim</option>
                </select>
            </div>

            <div class="input-group" id="grupoCorte" style="display:none;">
                <label>Corte?</label>
                <select id="corte" onchange="calcularImp()">
                    <option value="nao">Não</option>
                    <option value="sim">Sim</option>
                </select>
            </div>

            <div class="input-group">
                <label>Valor unitário (R$)</label>
                <input type="text" id="valorUnitario" readonly>
            </div>

            <div class="input-group result-total">
                <label>Total (R$)</label>
                <input type="text" id="totalImpressao" readonly>
            </div>

            <div class="input-group">
                <label>Largura item (cm)</label>
                <input type="number" id="larguraItem" value="5" oninput="calcularEncaixe()">
            </div>

            <div class="input-group">
                <label>Altura item (cm)</label>
                <input type="number" id="alturaItem" value="2" oninput="calcularEncaixe()">
            </div>

            <div class="input-group highlight-blue">
                <label>Qtd máxima por folha</label>
                <input type="text" id="qtdMaxima" readonly>
            </div>

            <div class="preview-wrapper">
                <h3>Pré-visualização</h3>
                <div id="previewFolha"></div>
            </div>
        </div>

        <div class="converter-section">
            <h3>Conversor de Medidas</h3>
            <div class="converter-grid">
                <div class="input-group">
                    <label>De:</label>
                    <input type="number" id="valorDe" placeholder="0" oninput="converterMedida()">
                    <select id="unidadeDe" onchange="converterMedida()">
                        <option value="mm">mm</option>
                        <option value="cm" selected>cm</option>
                        <option value="m">m</option>
                        <option value="pol">polegadas</option>
                    </select>
                </div>

                <div class="converter-arrow">
                    <span>➞</span>
                </div>

                <div class="input-group">
                    <label>Para:</label>
                    <input type="text" id="valorPara" readonly placeholder="Resultado">
                    <select id="unidadePara" onchange="converterMedida()">
                        <option value="mm">mm</option>
                        <option value="cm">cm</option>
                        <option value="m" selected>m</option>
                        <option value="pol">polegadas</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="tab-produtos" class="tab-content">
        <div class="products-section">
            <div class="search-wrapper">
                <input type="text" id="buscaProduto" class="search-input" placeholder="🔍 Digite para buscar um produto (Ex: Crachá)..." oninput="filtrarProdutos()">
            </div>

            <div class="products-table-wrapper">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>Produto / Especificação</th>
                            <th>Preço Unitário</th>
                        </tr>
                    </thead>
                    <tbody id="listaProdutosCorpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

    function switchTab(tabName) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        if (event && event.currentTarget) {

        }
        document.getElementById(`tab-${tabName}`).classList.add('active');

    // CARREGAMENTO DOS PRODUTOS NA TABELA
    function carregarProdutos() {
        const tabela = document.getElementById('listaProdutosCorpo');
        if (!tabela) return;
        tabela.innerHTML = "";

        listaDeProdutosProntos.forEach(produto => {
            const tr = document.createElement('tr');
            
            const tdNome = document.createElement('td');
            tdNome.classList.add('product-name-cell');
            tdNome.innerText = produto.nome;

            const tdPreco = document.createElement('td');
            tdPreco.classList.add('product-price-cell');
            tdPreco.innerText = produto.preco.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            tr.appendChild(tdNome);
            tr.appendChild(tdPreco);
            tabela.appendChild(tr);
        });
    }

    function filtrarProdutos() {
        // Função interna para remover acentos e deixar o texto limpo
        const removerAcentos = (texto) => {
            return texto
                .normalize("NFD")                  // Separa a letra do acento (Ex: "á" vira "a" + "´")
                .replace(/[\u0300-\u036f]/g, ""); // Remove os acentos modificadores soltos
        };

        // Pega o termo digitado, limpa espaços, remove acentos e divide em palavras
        const termoBusca = removerAcentos(document.getElementById('buscaProduto').value.toLowerCase().trim());
        const palavrasBusca = termoBusca.split(/\s+/);

        const tabela = document.getElementById('listaProdutosCorpo');
        const linhas = tabela.getElementsByTagName('tr');
        let encontrou = false;

        // Remove a linha de "sem resultados" se ela já existir
        const linhaAviso = document.getElementById('sem-resultados-row');
        if (linhaAviso) linhaAviso.remove();

        for (let i = 0; i < linhas.length; i++) {
            // Ignora a linha caso ela não tenha células válidas
            if (!linhas[i].getElementsByTagName('td')[0]) continue;

            // Pega o nome do produto e também remove os acentos dele para comparar de igual para igual
            const textoNomeOriginal = linhas[i].getElementsByTagName('td')[0].textContent.toLowerCase();
            const textoNomeSemAcento = removerAcentos(textoNomeOriginal);
            
            // Verifica se cada uma das palavras digitadas (sem acento) bate com o nome (sem acento)
            const atendeTodosOsTermos = palavrasBusca.every(palavra => textoNomeSemAcento.includes(palavra));

            if (atendeTodosOsTermos) {
                linhas[i].style.display = "";
                encontrou = true;
            } else {
                linhas[i].style.display = "none";
            }
        }

        // Se varreu tudo e não achou nada, mostra a mensagem amigável
        if (!encontrou) {
            const tr = document.createElement('tr');
            tr.id = 'sem-resultados-row';
            const td = document.createElement('td');
            td.colSpan = 2;
            td.classList.add('no-results');
            td.innerText = "Nenhum produto encontrado com esse termo.";
            tr.appendChild(td);
            tabela.appendChild(tr);
        }
    }

    function calcularEncaixe() {
        const tipoFolha = document.getElementById('tipoFolha').value;
        const grupoCorte = document.getElementById('grupoCorte');
        const larguraItem = parseFloat(document.getElementById('larguraItem').value) || 0;
        const alturaItem = parseFloat(document.getElementById('alturaItem').value) || 0;

        let larguraPapel = 21;
        let alturaPapel = 29.7;

        if (
            tipoFolha === "couche300A3" ||
            tipoFolha === "ap240gA3" ||
            tipoFolha === "adesivopapelA3"
        ) {
            grupoCorte.style.display = "flex";
        } else {
            grupoCorte.style.display = "none";
            document.getElementById('corte').value = "nao";
        }

        if (tipoFolha.includes("A3")) {
            larguraPapel = 29.7;
            alturaPapel = 42;
        }

        const colunas1 = Math.floor(larguraPapel / larguraItem);
        const lines1 = Math.floor(alturaPapel / alturaItem);
        const total1 = colunas1 * lines1;

        const colunas2 = Math.floor(larguraPapel / alturaItem);
        const lines2 = Math.floor(alturaPapel / larguraItem);
        const total2 = colunas2 * lines2;

        let melhor = {};
        
        if (total1 >= total2) {
            melhor = {
                largura: larguraItem,
                altura: alturaItem,
                colunas: colunas1,
                linhas: lines1,
                total: total1
            };
        } else {
            melhor = {
                largura: alturaItem,
                altura: larguraItem,
                colunas: colunas2,
                linhas: lines2,
                total: total2
            };
        }

        document.getElementById('qtdMaxima').value = melhor.total;
        desenharPreview(melhor, larguraPapel, alturaPapel);
    }

    function desenharPreview(config, larguraPapel, alturaPapel) {
        const preview = document.getElementById('previewFolha');
        preview.innerHTML = "";

        const escalaX = 300 / larguraPapel;
        const escalaY = 420 / alturaPapel;

        for (let linha = 0; linha < config.linhas; linha++) {
            for (let col = 0; col < config.colunas; col++) {
                const div = document.createElement('div');
                div.classList.add('retangulo');

                div.style.width = `${config.largura * escalaX}px`;
                div.style.height = `${config.altura * escalaY}px`;
                div.style.left = `${col * config.largura * escalaX}px`;
                div.style.top = `${linha * config.altura * escalaY}px`;

                preview.appendChild(div);
            }
        }
    }

    function atualizarMateriais() {
        const camposNormais = document.getElementById('camposNormais');
        const gridImp = document.getElementById('gridImpressao');
        const tipo = document.getElementById('tipoProduto').value;
        const selectMaterial = document.getElementById('material');
        const selectMaterialImp = document.getElementById('materialImp');
        const titulo = document.getElementById('titulo-pagina');
        const tipoImp = document.getElementById('tipoImpressão');

        titulo.innerText = "ORÇAMENTO DE " + tipo.toUpperCase().replace('_', ' ');
        selectMaterial.innerHTML = "";

        if (tipo === "impressão") {
            camposNormais.style.display = "none";
            gridImp.style.display = "grid";
            tipoImp.style.display = "block";

            const tipoFolha = document.getElementById('tipoFolha').value;
            selectMaterialImp.innerHTML = "";

            materiaisImp[tipoFolha].forEach(item => {
                let option = document.createElement('option');
                option.value = item.nome;
                option.text = item.nome;
                selectMaterialImp.appendChild(option);
            });

            calcularImp();
            calcularEncaixe();
        } else {
            camposNormais.style.display = "contents";
            gridImp.style.display = "none";
            tipoImp.style.display = "none";

            materiaisData[tipo].forEach(item => {
                let option = document.createElement('option');
                option.value = item.preco;
                option.text = `${item.nome} (R$ ${item.preco},00)`;
                selectMaterial.appendChild(option);
            });

            calcular();
        }
    }

    function calcularImp() {
        const folhas = parseInt(document.getElementById('qtdFolhas').value) || 0;
        const frenteVerso = document.getElementById('frenteVerso').value;
        const tipoFolha = document.getElementById('tipoFolha').value;
        const material = document.getElementById('materialImp').value;
        const corte = document.getElementById('corte')?.value || "nao";

        let valorUnit = 0;

        if (tipoFolha === "sulfiteA4") {
            if (material === "Preto e Branco") {
                if (folhas === 1) valorUnit = 2.50;
                else if (folhas <= 20) valorUnit = 0.70;
                else if (folhas <= 49) valorUnit = 0.35;
                else if (folhas <= 999) valorUnit = 0.25;
                else valorUnit = 0.20;
            }
            if (material === "Colorido | Jato ") {
                if (folhas === 1) valorUnit = 2.50;
                else if (folhas <= 49) valorUnit = 1.20;
                else if (folhas <= 999) valorUnit = 0.35;
                else valorUnit = 0.30;
            }
            if (material === "Colorido | Laser") {
                if (folhas === 1) valorUnit = 4.00;
                else if (folhas <= 49) valorUnit = 2.20;
                else valorUnit = 1.80;
            }
        }
        else if (tipoFolha === "sulfiteA3") {
            if (material === "Impressão A3 Preto e Branco") {
                if (folhas <= 20) valorUnit = 6.00;
                else valorUnit = 5.00;
            }
            if (material === "Impressão A3 Colorida") {
                if (folhas <= 20) valorUnit = 7.00;
                else valorUnit = 5.00;
            }
        }
        else if (tipoFolha === "couche170gA4") { valorUnit = folhas <= 15 ? 6.00 : 4.50; }
        else if (tipoFolha === "couche170A3") { valorUnit = folhas <= 15 ? 10.00 : 9.00; }
        else if (tipoFolha === "couche300A4") { valorUnit = folhas <= 15 ? 7.00 : 6.00; }
        else if (tipoFolha === "couche300A3") { valorUnit = folhas <= 15 ? 12.00 : 9.00; }
        else if (tipoFolha === "ap240gA4") { valorUnit = folhas <= 15 ? 8.00 : 7.00; }
        else if (tipoFolha === "ap240gA3") { valorUnit = folhas <= 15 ? 12.00 : 9.00; }
        else if (tipoFolha === "adesivopapelA4") { valorUnit = folhas <= 20 ? 10.00 : 9.00; }
        else if (tipoFolha === "adesivopapelA3") { valorUnit = folhas <= 15 ? 18.00 : 15.00; }

        let adicionalVerso = 0;
        if (frenteVerso === "sim") {
            if (material === "Preto e Branco") { adicionalVerso = 0.20; }
            else if (material === "Colorido | Jato ") { adicionalVerso = 0.35; }
            else { adicionalVerso = 1.80; }
        }

        valorUnit = valorUnit + adicionalVerso;

        if (corte === "sim" && (tipoFolha === "couche300A3" || tipoFolha === "ap240gA3" || tipoFolha === "adesivopapelA3")) {
            valorUnit += 5;
        }

        document.getElementById('valorUnitario').value = valorUnit.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const total = folhas * (valorUnit);
        document.getElementById('totalImpressao').value = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function calcular() {
        const tipo = document.getElementById('tipoProduto').value;
        const qtd = parseFloat(document.getElementById('quantidade').value) || 0;
        const linhas = parseFloat(document.getElementById('qtdLinhas').value) || 1;
        const altUnd = parseFloat(document.getElementById('altura').value) || 0;
        const compUnd = parseFloat(document.getElementById('comprimento').value) || 0;
        let precoM2 = parseFloat(document.getElementById('material').value) || 0;
        const aplicacaoChecked = document.getElementById('aplicacao').checked;
        
        if (aplicacaoChecked) { precoM2 += 35; }

        const margemArte = (tipo === 'pvc') ? 0 : 0.4; 

        const porLinha = Math.floor(qtd / linhas);
        document.getElementById('qtdPorLinha').value = porLinha;

        const espacoComp = (porLinha * (compUnd / 100)) + ((margemArte / 100) * (porLinha - 1));
        document.getElementById('espacoComprimento').value = espacoComp.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });

        const espacoAlt = ((linhas / 100) * altUnd) + ((margemArte / 100) * (linhas - 1));
        document.getElementById('espacoAltura').value = espacoAlt.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 });

        const m2 = espacoComp * espacoAlt;
        document.getElementById('metroQuadrado').value = m2.toFixed(6).replace('.', ',');

        const total = m2 * precoM2;
        document.getElementById('valorTotal').value = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', minimumFractionDigits: 5 });

        let recomendado = total < 30 ? 35 : Math.ceil(total / 5) * 5;
        document.getElementById('valorRecomendado').value = recomendado.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function converterMedida() {
        const valorDe = parseFloat(document.getElementById('valorDe').value);
        const unidadeDe = document.getElementById('unidadeDe').value;
        const unidadePara = document.getElementById('unidadePara').value;
        const inputResultado = document.getElementById('valorPara');

        if (isNaN(valorDe)) { inputResultado.value = ""; return; }

        const paraMilimetro = { mm: 1, cm: 10, m: 1000, pol: 25.4 };
        const valorEmMm = valorDe * paraMilimetro[unidadeDe];
        const resultado = valorEmMm / paraMilimetro[unidadePara];
        const casas = unidadePara === 'pol' ? 4 : 2;
        inputResultado.value = resultado.toLocaleString('pt-BR', { maximumFractionDigits: casas });
    }

    // Inicializa tudo ao carregar a página
    window.addEventListener('DOMContentLoaded', () => {
        atualizarMateriais();
        carregarProdutos();
    });
</script>
